[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "c4e-tutorials"
version = "0.1.0"
description = ""
authors = [
    {name = "Nadia", email = "nadia.sadiki18@gmail.com"},
    {name = "Zakaria", email = "zakariabouhia.iav@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["pandas (>=2.2.3,<3.0.0)", "numpy (>=2.2.5,<3.0.0)", "xarray (>=2025.4.0,<2026.0.0)", "earthkit (>=0.11.2,<0.16.0)", "ecmwf-opendata (>=0.3.19,<0.4.0)", "jupyter (>=1.1.1,<2.0.0)", "metview (>=1.16.1,<2.0.0)", "ipyleaflet (>=0.19.2,<0.20.0)", "cartopy (>=0.24.1,<0.25.0)", "folium (>=0.19.5,<0.20.0)", "dash (>=3.0.4,<4.0.0)", "dash-core-components (>=2.0.0,<3.0.0)", "dash-html-components (>=2.0.0,<3.0.0)", "dash-leaflet (>=1.1.2,<2.0.0)", "geopy (>=2.4.1,<3.0.0)", "haversine (>=2.9.0,<3.0.0)", "mplcursors (>=0.6,<0.7)", "bqplot (>=0.12.44,<0.13.0)", "contextily (>=1.6.2,<2.0.0)", "geo (>=0.1.1,<0.2.0)", "pyecharts (>=2.0.8,<3.0.0)", "hvplot (>=0.11.3,<0.12.0)", "geoviews (>=1.14.0,<2.0.0)", "jupyter-bokeh (>=4.0.5,<5.0.0)", "cufflinks (>=0.17.3,<0.18.0)", "datashader (>=0.18.1,<0.19.0)", "plotly (==6.1.1)", "cfgrib (>=0.9.15.0,<0.10.0.0)", "tk (>=0.1.0,<0.2.0)", "ipyvuetify (>=1.11.3,<2.0.0)", "kaleido (>=1.0.0,<2.0.0)", "earthkit-transforms (>=0.4.0,<0.5.0)", "ipywidgets (>=8.1.8,<9.0.0)", "geopandas (>=1.1.1,<2.0.0)"]

[tool.poetry]
package-mode = false

[tool.poetry.dependencies]
python = "^3.12"

[tool.poetry.group.dev.dependencies]
ruff = "^0.11.8"

[tool.poetry.group.jupyter.dependencies]
ipykernel = "^6.29.5"
matplotlib = "^3.10.1"

[tool.ruff.lint]
select = [
    "B",  # flake8-bugbear
    "D",  # pycodestyle
    "E",  # pycodestyle errors
    "F",  # pyflakes
    "I",  # isort
    "W",  # pycodestyle warnings
    "C4",  # flake8-comprehensions
    "PL",  # pylint
    "UP",  # pyupgrade
    "ARG001", # unused arguments in functions
]
ignore = [
    "B008",  # do not perform function calls in argument defaults
    "B904",  # Allow raising exceptions without from e, for HTTPException
    "D104",  # Ignore missing docstring in public package
    "D100",  # Ignore missing docstring in public module
    "D203",  # Ignore 1 blank line before class docstring
    "D213",  # Ignore Multi-line docstring summary should start at the second line
    "E501",  # line too long, handled by black
    "W191",  # indentation contains tabs
    "PLR2004",  # Magic value used in comparison
    "PLR0912",  # Too many branches
    "PLR0911",  # Too many return statements
    "PLR0915",  # Too many statements 
    "PLR0913",  # Too many arguments in function definition 


]